<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda - APU LUXURY Vendedor</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/vendedor.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body id="perfil-page">
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="sidebar-header"><div class="sidebar-logo"><img src="../image/Logo-Apu-Luxury-dorado-negro.png" alt="APU LUXURY"><span class="sidebar-logo-badge">PRO</span></div></div>
            <nav class="sidebar-nav">
                <a href="./dashboard.html" class="sidebar-nav-item"><i class="fas fa-home"></i> Inicio</a>
                <a href="./productos.html" class="sidebar-nav-item"><i class="fas fa-box"></i> Productos</a>
                <a href="./pedidos.html" class="sidebar-nav-item"><i class="fas fa-shopping-cart"></i> Pedidos</a>
                <a href="./perfil.html" class="sidebar-nav-item active"><i class="fas fa-store"></i> Mi Tienda</a>
            </nav>
            <div class="sidebar-footer"><a href="../login.html">Cerrar Sesión</a></div>
        </aside>
        <main class="dashboard-main">
            <header class="dashboard-header"><h1 class="header-title">Mi Tienda</h1></header>
            <div class="dashboard-content">
                <div class="alert alert-info"><i class="fas fa-info-circle alert-icon"></i><div class="alert-content"><div class="alert-title">Completa tu perfil</div><div class="alert-message">Para publicar productos, debes completar la información de tu tienda.</div></div></div>
                <div class="dashboard-card">
                    <div class="dashboard-card-header"><h3 class="dashboard-card-title">Información de la Tienda</h3></div>
                    <div class="dashboard-card-body">
                        <form id="form-perfil" class="form-vendedor">
                            <div class="form-group"><label class="form-label">Nombre de la Tienda</label><input type="text" id="tienda-nombre" class="form-input" placeholder="Mi Tienda Andina"></div>
                            <div class="form-group"><label class="form-label">Categoría Principal</label><select id="tienda-categoria" class="form-select"><option value="textil">Textiles de Alpaca</option><option value="artesania">Artesanía</option><option value="moda">Moda Andina</option></select></div>
                            <div class="form-group"><label class="form-label">Descripción</label><textarea id="tienda-descripcion" class="form-textarea" placeholder=" Describe tu negocio..."></textarea></div>
                            <button type="submit" class="btn btn-primary">GUARDAR PERFIL</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/vendedor.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const storage = window.StorageUtils;
            if (!storage.verificarVendedor()) return;
            const vendedores = storage.obtener(storage.almacen.VENDEDORES) || [];
            const vendedor = vendedores.find(v => v.usuarioId === storage.obtenerSesion().id);
            if (vendedor) { document.getElementById('tienda-nombre').value = vendedor.nombreTienda || ''; document.getElementById('tienda-descripcion').value = vendedor.descripcion || ''; document.getElementById('tienda-categoria').value = vendedor.categoria || 'textil'; }
            document.getElementById('form-perfil').addEventListener('submit', function(e) {
                e.preventDefault();
                const nombreTienda = document.getElementById('tienda-nombre').value.trim();
                const descripcion = document.getElementById('tienda-descripcion').value.trim();
                const categoria = document.getElementById('tienda-categoria').value;
                if (!nombreTienda || !descripcion) { storage.toast('Completa todos los campos', 'error'); return; }
                const sesion = storage.obtenerSesion();
                letvs = storage.obtener(storage.almacen.VENDEDORES) || [];
                let idx = vs.findIndex(v => v.usuarioId === sesion.id);
                const nuevo = { id: storage.generarId(), usuarioId: sesion.id, nombreTienda, descripcion, categoria, estado: 'activo' };
                if (idx === -1) vs.push(nuevo); else vs[idx] = {...vs[idx], ...nuevo};
                storage.guardar(storage.almacen.VENDEDORES, vs);
                storage.toast('Perfil guardado', 'success');
            });
        });
    </script>
</body>
</html>
