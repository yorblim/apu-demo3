<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - APU LUXURY</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-left">
            <img src="image/background-home.jpg" alt=" texture andina" class="auth-left-bg">
            <div class="auth-left-overlay"></div>
            <div class="auth-left-content">
                <span class="auth-brand-tag">CUSCO - PERÚ</span>
                <h1 class="auth-brand-title">El Arte de los <span>Andes</span>, Hecho Moda</h1>
                <p class="auth-brand-desc">Descubre prendas únicas de alpaca tejidas a mano por artesanos cusqueños. Herencia milenaria con diseño contemporáneo.</p>
            </div>
        </div>

        <div class="auth-right">
            <div class="auth-container">
                <div class="auth-logo">
                    <img src="image/Logo-Apu-Luxury-dorado-negro.png" alt="APU LUXURY" class="auth-logo-img">
                </div>

                <div class="auth-card">
                    <div class="auth-header">
                        <h2 class="auth-title">Bienvenido</h2>
                        <p class="auth-subtitle">Ingresa a tu cuenta para continuar</p>
                    </div>

                    <div id="login-error" class="auth-error"></div>

                    <form id="form-login" class="auth-form">
                        <div class="form-group">
                            <label class="form-label" for="login-email">Correo Electrónico</label>
                            <input type="email" id="login-email" class="form-input" placeholder="tu@correo.com" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="login-password">Contraseña</label>
                            <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
                        </div>

                        <div class="auth-remember">
                            <label class="form-checkbox">
                                <input type="checkbox" id="login-remember">
                                <span>Recordarme</span>
                            </label>
                            <a href="#" class="auth-forgot">¿Olvidaste tu contraseña?</a>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block auth-submit">
                            INICIAR SESIÓN
                        </button>
                    </form>

                    <div class="auth-footer">
                        ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
