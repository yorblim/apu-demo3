<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exportación - APU LUXURY Vendedor</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/vendedor.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="sidebar-header"><div class="sidebar-logo"><img src="../image/Logo-Apu-Luxury-dorado-negro.png" alt="APU LUXURY"><span class="sidebar-logo-badge">PRO</span></div></div>
            <nav class="sidebar-nav">
                <a href="./dashboard.html" class="sidebar-nav-item"><i class="fas fa-home"></i> Inicio</a>
                <a href="./productos.html" class="sidebar-nav-item"><i class="fas fa-box"></i> Productos</a>
                <a href="./pedidos.html" class="sidebar-nav-item"><i class="fas fa-shopping-cart"></i> Pedidos</a>
                <a href="./exportacion.html" class="sidebar-nav-item active"><i class="fas fa-shipping-fast"></i> Exportación</a>
                <a href="./perfil.html" class="sidebar-nav-item"><i class="fas fa-store"></i> Mi Tienda</a>
            </nav>
            <div class="sidebar-footer"><div class="sidebar-user"><div class="sidebar-user-avatar">V</div><div class="sidebar-user-name" id="nombre">Vendedor</div></div><a href="../login.html">Cerrar Sesión</a></div>
        </aside>
        <main class="dashboard-main">
            <header class="dashboard-header"><h1 class="header-title">Exportación y Envíos</h1></header>
            <div class="dashboard-content">
                <div class="dashboard-card">
                    <div class="dashboard-card-header"><h3 class="dashboard-card-title">Métodos de Envío</h3><button class="btn btn-sm btn-primary">+ AGREGAR</button></div>
                    <div class="dashboard-card-body">
                        <div class="config-row"><div class="config-label"><strong>Envío Nacional</strong><span>Cusco y provincias</span></div><span class="badge badge-success">Activo</span></div>
                        <div class="config-row"><div class="config-label"><strong>Envío Internacional</strong><span>América Latina, USA, Europa</span></div><span class="badge badge-success">Activo</span></div>
                    </div>
                </div>
                <div class="dashboard-card">
                    <div class="dashboard-card-header"><h3 class="dashboard-card-title">Zonas de Cobertura</h3></div>
                    <div class="dashboard-card-body">
                        <p style="color: #666;">Actualmente cubrimos envío a todo el Perú y Latinoamérica.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../assets/js/storage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const storage = window.StorageUtils;
            if (!storage.verificarVendedor()) return;
            document.getElementById('nombre').textContent = storage.obtenerSesion().nombre;
        });
    </script>
</body>
</html>
