<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas - APU LUXURY Vendedor</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/vendedor.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="sidebar-header"><div class="sidebar-logo"><img src="../image/Logo-Apu-Luxury-dorado-negro.png" alt="APU LUXURY"><span class="sidebar-logo-badge">PRO</span></div></div>
            <nav class="sidebar-nav">
                <a href="./dashboard.html" class="sidebar-nav-item"><i class="fas fa-home"></i> Inicio</a>
                <a href="./productos.html" class="sidebar-nav-item"><i class="fas fa-box"></i> Productos</a>
                <a href="./pedidos.html" class="sidebar-nav-item"><i class="fas fa-shopping-cart"></i> Pedidos</a>
                <a href="./perfil.html" class="sidebar-nav-item"><i class="fas fa-store"></i> Mi Tienda</a>
            </nav>
            <div class="sidebar-footer"><a href="../login.html">Cerrar Sesión</a></div>
        </aside>
        <main class="dashboard-main">
            <header class="dashboard-header"><h1 class="header-title">Estadísticas</h1></header>
            <div class="dashboard-content">
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-card-value" id="stat-total-ventas">S/ 0.00</div><div class="stat-card-label">Ventas Totales</div></div>
                    <div class="stat-card"><div class="stat-card-value" id="stat-pedidos-mes">0</div><div class="stat-card-label">Pedidos Este Mes</div></div>
                    <div class="stat-card"><div class="stat-card-value" id="stat-productos-activos">0</div><div class="stat-card-label">Productos Activos</div></div>
                </div>
                <div class="chart-container">
                    <h3 class="chart-title">Ventas Mensuales</h3>
                    <div class="chart-placeholder">
                        <div class="chart-bar" style="height: 60%;"></div>
                        <div class="chart-bar" style="height: 80%;"></div>
                        <div class="chart-bar" style="height: 45%;"></div>
                        <div class="chart-bar" style="height: 90%;"></div>
                        <div class="chart-bar" style="height: 70%;"></div>
                        <div class="chart-bar" style="height: 55%;"></div>
                        <div class="chart-bar" style="height: 85%;"></div>
                        <div class="chart-bar" style="height: 95%;"></div>
                        <div class="chart-bar" style="height: 65%;"></div>
                        <div class="chart-bar" style="height: 75%;"></div>
                        <div class="chart-bar" style="height: 50%;"></div>
                        <div class="chart-bar" style="height: 88%;"></div>
                    </div>
                    <div class="chart-labels"><span>Ene</span><span>Feb</span><span>Mar</span><span>Abr</span><span>May</span><span>Jun</span><span>Jul</span><span>Ago</span><span>Sep</span><span>Oct</span><span>Nov</span><span>Dic</span></div>
                </div>
            </div>
        </main>
    </div>
    <script src="../assets/js/storage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const storage = window.StorageUtils;
            if (!storage.verificarVendedor()) return;
            const productos = storage.obtener(storage.almacen.PRODUCTOS) || [];
            const pedidos = storage.obtener(storage.almacen.PEDIDOS) || [];
            const ventasTotales = pedidos.reduce((s, p) => s + p.total, 0);
            document.getElementById('stat-total-ventas').textContent = storage.precio(ventasTotales);
            document.getElementById('stat-pedidos-mes').textContent = pedidos.length;
            document.getElementById('stat-productos-activos').textContent = productos.filter(p => p.estado === 'activo').length;
        });
    </script>
</body>
</html>
