<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos - APU LUXURY Vendedor</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/vendedor.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body id="pedidos-page">
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="sidebar-header"><div class="sidebar-logo"><img src="../image/Logo-Apu-Luxury-dorado-negro.png" alt="APU LUXURY"><span class="sidebar-logo-badge">PRO</span></div></div>
            <nav class="sidebar-nav">
                <div class="sidebar-nav-title">Menú</div>
                <a href="./dashboard.html" class="sidebar-nav-item"><i class="fas fa-home"></i> Inicio</a>
                <a href="./productos.html" class="sidebar-nav-item"><i class="fas fa-box"></i> Productos</a>
                <a href="./inventario.html" class="sidebar-nav-item"><i class="fas fa-warehouse"></i> Inventario</a>
                <a href="./pedidos.html" class="sidebar-nav-item active"><i class="fas fa-shopping-cart"></i> Pedidos</a>
                <a href="./exportacion.html" class="sidebar-nav-item"><i class="fas fa-shipping-fast"></i> Exportación</a>
                <a href="./documentacion.html" class="sidebar-nav-item"><i class="fas fa-file-alt"></i> Documentación</a>
                <div class="sidebar-nav-title" style="margin-top: 20px;">Cuenta</div>
                <a href="./perfil.html" class="sidebar-nav-item"><i class="fas fa-store"></i> Mi Tienda</a>
            </nav>
            <div class="sidebar-footer"><div class="sidebar-user"><div class="sidebar-user-avatar" id="avatar">V</div><div class="sidebar-user-name" id="nombre">Vendedor</div></div></div>
        </aside>
        <main class="dashboard-main">
            <header class="dashboard-header"><div class="header-left"><h1 class="header-title">Pedidos</h1></div></header>
            <div class="dashboard-content">
                <div class="dashboard-card">
                    <div class="dashboard-card-body" style="padding: 0;">
                        <table class="table-vendedor"><thead><tr><th>Pedido</th><th>Cliente</th><th>Productos</th><th>Total</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="pedidos-tabla"></tbody></table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div class="modal-overlay" id="modal-pedido">
        <div class="modal modal-vendedor">
            <div class="modal-header"><h3 class="modal-title">Detalles del Pedido</h3><button class="modal-close" id="cerrar-modal-pedido">&times;</button></div>
            <div class="modal-body" id="modal-pedido-contenido"></div>
        </div>
    </div>
    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/vendedor.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const storage = window.StorageUtils;
            if (!storage.verificarVendedor()) return;
            const sesion = storage.obtenerSesion();
            document.getElementById('nombre').textContent = sesion.nombre;
            document.getElementById('avatar').textContent = sesion.nombre[0];
            const pedidos = storage.obtener(storage.almacen.PEDIDOS) || [];
            document.getElementById('pedidos-tabla').innerHTML = pedidos.length === 0 ? '<tr><td colspan="6" style="text-align:center;padding:40px;">No hay pedidos</td></tr>' : pedidos.map(p => `
                <tr><td><strong>${p.codigoPedido}</strong></td><td>${p.compradorNombre}</td><td>${p.items.length}</td><td>${storage.precio(p.total)}</td><td><span class="table-status pending">${p.estado}</span></td><td><button class="btn btn-sm btn-outline-dark" onclick="abrirModalPedido('${p.id}')">Ver</button></td></tr>
            `).join('');
            document.getElementById('cerrar-modal-pedido').addEventListener('click', () => document.getElementById('modal-pedido').classList.remove('active'));
        });
    </script>
</body>
</html>
