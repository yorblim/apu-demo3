<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - APU LUXURY</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-left">
            <img src="image/background-home.jpg" alt=" textur a andina" class="auth-left-bg">
            <div class="auth-left-overlay"></div>
            <div class="auth-left-content">
                <span class="auth-brand-tag">CUSCO - PERÚ</span>
                <h1 class="auth-brand-title">El Arte de los <span>Andes</span>, Hecho Moda</h1>
                <p class="auth-brand-desc">Descubre prendas únicas de alpaca tejidas a mano por artesanos cusqueños. Herencia milenaria con diseño contemporáneo.</p>
            </div>
        </div>

        <div class="auth-right">
            <div class="auth-container">
                <div class="auth-logo">
                    <img src="image/Logo-Apu-Luxury-dorado-negro.png" alt="APU LUXURY" class="auth-logo-img">
                </div>

                <div class="auth-card">
                    <div class="auth-header">
                        <h2 class="auth-title">Crear Cuenta</h2>
                        <p class="auth-subtitle">Únete a la comunidad APU LUXURY</p>
                    </div>

                    <div id="registro-error" class="auth-error"></div>

                    <form id="form-registro" class="auth-form">
                        <div class="form-group">
                            <label class="form-label">Quiero registrarme como:</label>
                            <div class="role-selector">
                                <label class="role-btn" data-rol="comprador">
                                    <i class="role-icon fas fa-shopping-bag"></i>
                                    <div class="role-title">Comprador</div>
                                    <div class="role-desc">Quiero comprar productos</div>
                                    <input type="radio" name="rol" value="comprador">
                                </label>
                                <label class="role-btn" data-rol="vendedor">
                                    <i class="role-icon fas fa-store"></i>
                                    <div class="role-title">Vendedor</div>
                                    <div class="role-desc">Quiero vender mis productos</div>
                                    <input type="radio" name="rol" value="vendedor">
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="registro-nombre">Nombre Completo</label>
                            <input type="text" id="registro-nombre" class="form-input" placeholder="Juan Pérez" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="registro-email">Correo Electrónico</label>
                            <input type="email" id="registro-email" class="form-input" placeholder="tu@correo.com" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="registro-telefono">Teléfono</label>
                            <input type="tel" id="registro-telefono" class="form-input" placeholder="+51 987 654 321" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="registro-password">Contraseña</label>
                                <input type="password" id="registro-password" class="form-input" placeholder="••••••••" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="registro-confirm">Confirmar Contraseña</label>
                                <input type="password" id="registro-confirm" class="form-input" placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="register-terms">
                            <label class="form-checkbox">
                                <input type="checkbox" id="registro-terminos" required>
                                <span>Acepto los <a href="#">Términos y Condiciones</a> y la <a href="#">Política de Privacidad</a></span>
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block auth-submit">
                            CREAR MI CUENTA
                        </button>
                    </form>

                    <div class="auth-footer">
                        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
