<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - APU LUXURY</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/comprador.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body id="catalogo-page">
    <div id="navbar-container"></div>

    <main class="main-content" style="padding-top: 80px;">
        <section class="products-section">
            <div class="filters-bar">
                <div class="filters-left">
                    <span class="filters-count" id="productos-count">Todos los productos</span>
                    <select id="filtro-categoria" class="filters-select">
                        <option value="todas">Todas las categorías</option>
                        <option value="abrigos">Abrigos & Ponchos</option>
                        <option value="chompas">Chompas & Sweaters</option>
                        <option value="accesorios">Accesorios</option>
                        <option value="vestidos">Vestidos & Faldas</option>
                    </select>
                </div>
                <div class="filters-right">
                    <div class="hero-search" style="margin-top: 0; max-width: 300px;">
                        <input type="text" id="busqueda-input" class="hero-search-input" placeholder="Buscar productos...">
                        <button id="busqueda-btn" class="hero-search-btn"><i class="fas fa-search"></i></button>
                    </div>
                </div>
            </div>

            <div class="products-grid" id="productos-grid"></div>
        </section>
    </main>

    <div id="footer-container"></div>

    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/componentes.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const storage = window.StorageUtils;
            if (!storage.verificarComprador()) return;
            
            const renderizarProductos = (filtros = {}) => {
                const grid = document.getElementById('productos-grid');
                if (!grid) return;

                let productos = storage.obtener(storage.almacen.PRODUCTOS) || [];

                if (filtros.categoria && filtros.categoria !== 'todas') {
                    productos = productos.filter(p => p.categoria === filtros.categoria);
                }

                if (filtros.busqueda) {
                    const termino = filtros.busqueda.toLowerCase();
                    productos = productos.filter(p => 
                        p.nombre.toLowerCase().includes(termino) ||
                        p.descripcion.toLowerCase().includes(termino)
                    );
                }

                if (productos.length === 0) {
                    grid.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1; text-align: center; padding: 60px;"><h3 style="color: #1A1A1A;">No se encontraron productos</h3></div>';
                    return;
                }

                document.getElementById('productos-count').textContent = productos.length + ' productos';

                grid.innerHTML = productos.map(producto => `
                    <article class="product-card">
                        <div class="product-image">
                            ${producto.precioOriginal ? '<span class="product-badge badge-pink">SALE</span>' : ''}
                            <button class="product-wishlist"><i class="far fa-heart"></i></button>
                            <img src="${producto.imagen}" alt="${producto.nombre}">
                            <button class="product-add" data-id="${producto.id}">AÑADIR AL CARRITO</button>
                        </div>
                        <div class="product-info">
                            <span class="product-category">${producto.categoria.toUpperCase()}</span>
                            <h3 class="product-name">${producto.nombre}</h3>
                            <p class="product-material">${producto.material}</p>
                            <p class="product-price">
                                <strong>${storage.precio(producto.precio)}</strong>
                                ${producto.precioOriginal ? '<del>' + storage.precio(producto.precioOriginal) + '</del>' : ''}
                            </p>
                        </div>
                    </article>
                `).join('');

                grid.querySelectorAll('.product-add').forEach(btn => {
                    btn.addEventListener('click', function() {
                        agregarAlCarrito(this.dataset.id);
                    });
                });
            };

const agregarAlCarrito = (productoId) => {
                const productos = storage.obtener(storage.almacen.PRODUCTOS);
                const producto = productos.find(p => p.id === productoId);
                if (!producto) return;

                const carousel = storage.obtener(storage.almacen.CARRITO) || [];
                const item = {
                    id: storage.generarId(),
                    productoId: producto.id,
                    nombre: producto.nombre,
                    imagen: producto.imagen,
                    precio: producto.precio,
                    cantidad: 1,
                    talle: producto.talles[0],
                    color: producto.colores[0],
                    vendedorId: producto.vendedorId,
                    vendedorNombre: producto.vendedorNombre
                };
                carousel.push(item);
                storage.guardar(storage.almacen.CARRITO, carousel);
                storage.toast('Producto agregado al carrito', 'success');
                actualizarContador();
            };

            const actualizarContador = () => {
                const contador = document.getElementById('cart-count');
                if (!contador) return;
                const carousel = storage.obtener(storage.almacen.CARRITO) || [];
                const total = carousel.reduce((sum, item) => sum + item.cantidad, 0);
                contador.textContent = total;
                contador.style.display = total > 0 ? 'flex' : 'none';
            };

            const urlParams = new URLSearchParams(window.location.search);
            const categoriaUrl = urlParams.get('categoria');
            if (categoriaUrl) {
                document.getElementById('filtro-categoria').value = categoriaUrl;
                renderizarProductos({ categoria: categoriaUrl });
            } else {
                renderizarProductos();
            }

            document.getElementById('filtro-categoria').addEventListener('change', function() {
                const busqueda = document.getElementById('busqueda-input').value;
                renderizarProductos({ categoria: this.value, busqueda });
            });

            document.getElementById('busqueda-btn').addEventListener('click', function() {
                const categoria = document.getElementById('filtro-categoria').value;
                renderizarProductos({ categoria, busqueda: document.getElementById('busqueda-input').value });
            });
        });
    </script>
</body>
</html>
