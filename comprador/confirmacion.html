<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación - APU LUXURY</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/comprador.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="navbar-container"></div>

    <main class="main-content" style="padding-top: 120px; padding-bottom: 80px; background: var(--white);">
        <div style="max-width: 600px; margin: 0 auto; text-align: center; padding: 0 20px;">
            <div style="width: 80px; height: 80px; background: #D1FAE5; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px;">
                <i class="fas fa-check" style="font-size: 40px; color: #10B981;"></i>
            </div>
            
            <h1 style="font-family: var(--font-serif); font-size: 36px; color: var(--black-oscuro); margin-bottom: 15px;">¡Pedido Confirmado!</h1>
            <p style="color: #666; font-size: 16px; margin-bottom: 40px;">Tu pedido ha sido registrado exitosamente.</p>
            
            <div id="detalle-pedido" style="background: #F9FAFB; border-radius: 12px; padding: 30px; text-align: left; margin-bottom: 30px;"></div>
            
            <a href="./seguimiento-privado.html" class="btn btn-primary">VER SEGUIMIENTO</a>
            <a href="./catalogo.html" class="btn btn-outline-dark" style="margin-left: 15px;">SEGUIR COMPRANDO</a>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/componentes.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const storage = window.StorageUtils;
            const codigoPedido = localStorage.getItem('apu_ultimo_pedido');
            
            if (!codigoPedido) {
                window.location.href = 'catalogo.html';
                return;
            }
            
            const pedidos = storage.obtener(storage.almacen.PEDIDOS) || [];
            const pedido = pedidos.find(p => p.codigoPedido === codigoPedido);
            
            if (!pedido) {
                window.location.href = 'catalogo.html';
                return;
            }
            
            document.getElementById('detalle-pedido').innerHTML = `
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                    <span style="color: #666;">Número de Pedido</span>
                    <strong style="color: var(--black-oscuro);">${pedido.codigoPedido}</strong>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                    <span style="color: #666;">Código de Seguimiento</span>
                    <strong style="color: var(--black-oscuro);">${pedido.codigoSeguimiento}</strong>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                    <span style="color: #666;">Fecha</span>
                    <strong style="color: var(--black-oscuro);">${new Date(pedido.fechaPedido).toLocaleDateString('es-PE')}</strong>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                    <span style="color: #666;">Total</span>
                    <strong style="color: var(--orange); font-size: 20px;">${storage.precio(pedido.total)}</strong>
                </div>
                <div style="padding-top: 20px; border-top: 1px solid #E5E7EB;">
                    <span style="color: #666;">Estado</span>
                    <span class="badge badge-success" style="margin-left: 10px;">${pedido.estado}</span>
                </div>
            `;
        });
    </script>
</body>
</html>
